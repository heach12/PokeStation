<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéStation | Database</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="hoverPreview">
    <div id="hoverContent" class="text-center">
      <img id="hoverImg" src="" class="img-fluid rounded mb-2 shadow" style="max-height:300px;">
      <div id="hoverStats" class="small fw-bold text-info"></div>
    </div>
  </div>

  <nav class="navbar navbar-dark navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand text-info" href="index.html">POKÉSTATION</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home me-1"></i>Home</a></li>
          <li class="nav-item active"><a class="nav-link text-info" href="cards.html"><i class="fas fa-layer-group me-1"></i>Cards</a></li>
          <li class="nav-item"><a class="nav-link" href="deck.html"><i class="fas fa-chess-board me-1"></i>Deck Builder</a></li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle text-info" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
              Shop & Info
            </a>
            <div class="dropdown-menu dropdown-menu-end">
              <a class="dropdown-item" href="shop.html">Booster Shop</a>
              <a class="dropdown-item" href="how2play.html">How to Play</a>
              <a class="dropdown-item" href="news.html">News & Updates</a>
              <div class="dropdown-divider" style="border-color: rgba(255,255,255,0.1);"></div>
              <a class="dropdown-item" href="contact.html">Contact Us</a>
            </div>
          </li>
          <li class="nav-item ms-lg-3">
            <label class="theme-switch ms-2">
            <input type="checkbox" id="themeToggle">
            <span class="slider"></span>
            </label>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4 mb-5">
    <div class="row">
      <div class="col-lg-9 order-2 order-lg-1">
        <h2 class="mb-3">Card Database</h2>
        <div class="row g-2 mb-4">
          <div class="col-md-4">
            <input id="search" class="form-control form-control-lg bg-dark text-white border-info" placeholder="Search Pokémon (Press Enter)...">
          </div>
          <div class="col-4 col-md-2">
            <select id="supertypeFilter" class="form-select form-select-lg filter-select">
              <option value="Pokémon">Pokémon</option>
              <option value="Trainer">Trainers</option>
              <option value="Energy">Energy</option>
            </select>
          </div>
          <div class="col-4 col-md-3">
            <select id="typeFilter" class="form-select form-select-lg filter-select">
              <option value="">All Types</option>
              <option value="Fire">🔥 Fire</option>
              <option value="Water">💧 Water</option>
              <option value="Grass">🌿 Grass</option>
              <option value="Lightning">⚡ Lightning</option>
              <option value="Psychic">👁️ Psychic</option>
              <option value="Fighting">👊 Fighting</option>
              <option value="Darkness">🌑 Darkness</option>
              <option value="Metal">⚙️ Metal</option>
              <option value="Dragon">🐉 Dragon</option>
              <option value="Colorless">⚪ Colorless</option>
            </select>
          </div>
          <div class="col-4 col-md-3">
            <select id="sortOrder" class="form-select form-select-lg filter-select">
              <option value="relevance">Relevance</option>
              <option value="hp_desc">Pro to Weak (High HP)</option>
              <option value="hp_asc">Weak to Pro (Low HP)</option>
              <option value="az">A-Z</option>
              <option value="za">Z-A</option>
            </select>
          </div>
        </div>

        <div id="loading" class="text-center text-info my-5" style="display:none;">
          <div class="spinner-border" role="status"></div>
          <h5 class="mt-2">Fetching from PokéTCG API...</h5>
        </div>

        <div class="row" id="grid"></div>

        <div class="text-center mt-5">
          <button id="loadMore" class="btn btn-outline-info px-5 py-2 fw-bold" style="display:none;">
            <i class="fas fa-plus-circle me-2"></i>Load More Cards
          </button>
        </div>
      </div>

      <div class="col-lg-3 mb-4 order-1 order-lg-2">
        <div class="fav-panel sticky-top mb-4" style="top:80px;">
          <h4 class="text-info"><i class="fas fa-star me-2"></i>Favourites</h4>
          <ul id="favList" class="list-unstyled mt-3"></ul>
          <div id="clearInitial">
            <button id="btnPrepareClear" class="btn btn-outline-danger btn-sm w-100 mt-2">Clear All Favourites</button>
          </div>
          <div id="clearConfirm" style="display:none;" class="mt-2 p-2 border border-danger rounded text-center">
            <p class="small mb-2 text-danger fw-bold">Are you sure?</p>
            <div class="d-flex gap-2">
              <button id="btnConfirmClear" class="btn btn-danger btn-sm flex-grow-1">Yes</button>
              <button id="btnCancelClear" class="btn btn-secondary btn-sm flex-grow-1">No</button>
            </div>
          </div>
        </div>

        <div class="fav-panel sticky-top" style="top:380px;">
          <h4 class="text-warning"><i class="fas fa-columns me-2"></i>Comparison</h4>
          <p class="small text-muted mb-2">Tick boxes on cards (Max 3).</p>
          <ul id="compareList" class="list-unstyled mt-2">
            <li class="text-muted border-0 small">None selected.</li>
          </ul>
          <button id="btnCompareNow" class="btn btn-warning btn-sm w-100 mt-2 fw-bold d-none">Compare Selected</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="quickViewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-white border-info shadow-lg">
        <div class="modal-body text-center p-4" id="quickViewBody"></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="compareModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content bg-dark text-white border-warning shadow-lg">
        <div class="modal-header border-secondary">
          <h5 class="modal-title text-warning">Card Comparison</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-4" id="compareBody"></div>
        </div>
      </div>
    </div>
  </div>

  <button id="backToTop" class="btn btn-info position-fixed bottom-0 end-0 m-4 shadow">
    <i class="fas fa-arrow-up"></i>
  </button>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
